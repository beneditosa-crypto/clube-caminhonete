<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <!-- ================= META ================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Clube da Caminhonete</title>

  <!-- ================= ESTILO ================= -->
  <style>

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background: #ffffff;
      color: #1b1b1b;
    }

    /* ================= HEADER ================= */
    .header {
      position: fixed;
      width: 100%;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    /* ================= HERO ================= */
    .hero {
      height: 90vh;
      background: url('assets/images/banner.png') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      padding-top: 80px;
    }

    /* ================= SEÇÕES ================= */
    .section {
      padding: 70px 20px;
      text-align: center;
    }

    .green { background: #0f2c1d; color: white; }
    .cream { background: #f4f1e8; }
    .white { background: #ffffff; }

    /* ================= GRID ================= */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      max-width: 1100px;
      margin: auto;
    }

    /* ================= CARD ================= */
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,.1);
      text-align: left;
    }

    /* ================= BOTÃO ================= */
    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: #d9c48f;
      border-radius: 8px;
      color: #111;
      font-weight: bold;
    }

    .whatsapp {
      background: #25D366;
      color: white;
    }

  </style>

</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
  <strong>Clube da Caminhonete</strong>
  <a href="https://wa.me/5561991663179" target="_blank">WhatsApp</a>
</header>

<main>

  <!-- ================= HERO / BANNER ================= -->
  <section class="hero">
    <div>
      <h1>O Melhor Site de Carros Antigos do Brasil</h1>
      <p>Compre, venda e anuncie veículos clássicos</p>
      <a class="btn">Anunciar veículo</a>
    </div>
  </section>

  <!-- ================= ANÚNCIOS ================= -->
  <!-- ALTERAR SOMENTE ESTA SEÇÃO PARA MEXER NOS ANÚNCIOS -->
  <section class="section green" id="anuncios-section">
    <h2>Anúncios</h2>

    <div id="anuncios" class="grid"></div>
  </section>

  <!-- ================= EVENTOS ================= -->
  <!-- ALTERAR SOMENTE ESTA SEÇÃO PARA MEXER NOS EVENTOS -->
  <section class="section cream" id="eventos-section">
    <h2>Eventos</h2>

    <div id="eventos" class="grid"></div>
  </section>

  <!-- ================= GALERIA ================= -->
  <section class="section white">
    <h2>Galeria</h2>

    <div class="grid">
      <img src="assets/images/foto1.png">
      <img src="assets/images/foto2.png">
      <img src="assets/images/foto3.png">
    </div>
  </section>

  <!-- ================= INSTITUCIONAL ================= -->
  <section class="section cream">
    <h2>Sobre o Clube</h2>
    <p>Marketplace de veículos clássicos</p>
  </section>

</main>

<!-- ================= RODAPÉ ================= -->
<footer class="section">
  Clube da Caminhonete © 2026
</footer>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_CHAVE",
  projectId: "clube-da-caminhonete-be770"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= ANÚNCIOS ================= */
async function carregarAnuncios() {
  const container = document.getElementById("anuncios");

  const snapshot = await getDocs(collection(db, "anuncios"));

  snapshot.forEach(doc => {
    const a = doc.data();

    if (a.status === "aprovado") {
      container.innerHTML += `
        <div class="card">
          <h3>${a.titulo}</h3>
          <p>${a.marca} ${a.modelo}</p>
          <p>R$ ${a.preco}</p>
        </div>
      `;
    }
  });
}

/* ================= EVENTOS ================= */
async function carregarEventos() {
  const container = document.getElementById("eventos");

  const snapshot = await getDocs(collection(db, "eventos"));

  snapshot.forEach(doc => {
    const e = doc.data();

    if (e.status === "aprovado") {
      container.innerHTML += `
        <div class="card">
          <h3>${e.titulo}</h3>
          <p>${e.data} - ${e.local}</p>
        </div>
      `;
    }
  });
}

carregarAnuncios();
carregarEventos();

</script>

</body>
</html>
